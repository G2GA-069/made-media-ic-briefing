<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>This site is paused</title>
<meta name="robots" content="noindex">
<style>
:root { color-scheme: dark; }
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
  background: radial-gradient(ellipse at top, #12121A 0%, #08080E 65%);
  color: #F5F5FA;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
.card { width: 100%; max-width: 460px; text-align: center; }
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 13px;
  border-radius: 999px;
  background: rgba(255,181,71,0.10);
  border: 1px solid rgba(255,181,71,0.35);
  color: #FFB547;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 28px;
}
.badge-dot { width: 7px; height: 7px; border-radius: 50%; background: #FFB547; }
h1 {
  font-size: clamp(28px, 5vw, 38px); font-weight: 700;
  letter-spacing: -0.02em; margin-bottom: 14px; color: #F5F5FA;
}
p.lead { color: #B5B5BF; font-size: 16px; margin-bottom: 40px; }
.advert {
  background: rgba(79,255,224,0.04);
  border: 1px solid rgba(79,255,224,0.22);
  border-radius: 16px;
  padding: 30px 26px;
  text-align: center;
}
.advert-eyebrow {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: #4FFFE0; margin-bottom: 12px;
}
.advert-title {
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.01em; margin-bottom: 10px; color: #F5F5FA;
}
.advert-sub { color: #B5B5BF; font-size: 14px; margin-bottom: 22px; }
.advert-cta {
  display: inline-block;
  background: #4FFFE0; color: #08080E;
  font-weight: 700; font-size: 15px;
  padding: 13px 28px; border-radius: 10px;
  text-decoration: none;
  transition: transform 0.15s ease, filter 0.15s ease;
}
.advert-cta:hover { transform: translateY(-1px); filter: brightness(1.08); }
.advert-cta:focus-visible { outline: 2px solid #4FFFE0; outline-offset: 3px; }
.footer { margin-top: 26px; font-size: 12px; color: #6B6B74; }
.footer a { color: #9797A0; text-decoration: none; }
.footer a:hover { color: #F5F5FA; }
</style>
</head>
<body>
  <main class="card">
    <div class="badge"><span class="badge-dot"></span> Paused</div>
    <h1>This site is paused</h1>
    <p class="lead">The owner has temporarily taken it offline. Check back later.</p>
    <section class="advert">
      <div class="advert-eyebrow">Built with HTMLaunch</div>
      <div class="advert-title">Publish your own site in 60 seconds</div>
      <div class="advert-sub">Drag, drop, done. Free forever. No credit card, no code.</div>
      <a class="advert-cta" href="https://htmlaunch.com/">Launch yours &rarr;</a>
    </section>
    <div class="footer"><a href="https://htmlaunch.com/">htmlaunch.com</a></div>
  </main>
</body>
</html>
